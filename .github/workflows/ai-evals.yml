name: AI Review Evals

on:
  workflow_run:
    workflows: ["AI Review"]
    types:
      - completed
  workflow_dispatch:

jobs:
  ai-evals:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run && github.event.workflow_run.conclusion == 'success') }}
    permissions:
      contents: read
      pull-requests: write
      models: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch PR Details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            const { eventName, payload, repo } = context;
            
            if (eventName === 'workflow_run') {
              const run = payload.workflow_run;
              if (run) {
                const head_branch = run.head_branch;
                const prs = await github.rest.pulls.list({
                  owner: repo.owner,
                  repo: repo.repo,
                  head: `${repo.owner}:${head_branch}`
                });
                prNumber = prs.data[0]?.number;
              }
            } else if (context.issue && context.issue.number) {
              prNumber = context.issue.number;
            }
            
            if (prNumber) {
              core.setOutput('number', prNumber);
            } else {
              core.setFailed('Could not determine PR number');
            }

      - name: Get Latest AI Review Comment
        id: review_comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const pr_number = parseInt(process.env.PR_NUMBER);
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number
            });
            const aiComment = comments.data.find(c => c.body.includes('### AI Code Review Result'));
            core.setOutput('body', aiComment ? aiComment.body : 'No review found');

      - name: Read EVALS.md
        id: evals
        run: |
          {
            echo 'content<<EOF'
            cat EVALS.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: AI Evaluator
        id: evaluator
        uses: actions/ai-inference@v1
        with:
          model: 'openai/gpt-4o-mini'
          system-prompt: |
            You are the Evaluator Agent (Judge).
            Use the following instructions to grade the AI Reviewer's output.
            
            EVALUATION INSTRUCTIONS:
            ${{ steps.evals.outputs.content }}
          prompt: |
            Grade the following AI Review:
            ${{ steps.review_comment.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment Evaluation on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### AI Evaluation Result
            ${{ steps.evaluator.outputs.response }}
          comment_tag: ai-eval-result
          pr_number: ${{ steps.pr.outputs.number }}

      - name: Set Evaluation Label
        uses: actions/github-script@v7
        env:
          EVAL_RESPONSE: ${{ steps.evaluator.outputs.response }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const response = process.env.EVAL_RESPONSE;
            const pr_number = parseInt(process.env.PR_NUMBER);
            let label = 'ai-eval-pending';
            if (response.includes('ai-eval-pass')) label = 'ai-eval-pass';
            else if (response.includes('ai-eval-fail')) label = 'ai-eval-fail';
            
            github.rest.issues.addLabels({
              issue_number: pr_number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [label]
            });