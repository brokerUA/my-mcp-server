name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      models: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR Diff
        id: diff
        run: |
          # We exclude binary files, lock files, and other irrelevant changes
          # We limit the size of the diff to 4000 lines or ~20KB to fit into the 8000 token limit
          git diff "origin/${{ github.base_ref }}...HEAD" \
            -- . ':(exclude)*.loc k' ':(exclude)dist/*' ':(exclude)vendor/*' > pr_full.diff
          
          # We take the first 300 lines or ~15KB to ensure we fit into the 8000 token limit
          head -n 300 pr_full.diff > pr.diff
          
          echo "diff_file=pr.diff" >> "$GITHUB_OUTPUT"

      - name: Read CODEBASE.md
        id: codebase
        run: |
          {
            echo 'content<<EOF'
            cat CODEBASE.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Read REVIEW.md
        id: review_instructions
        run: |
          {
            echo 'content<<EOF'
            cat REVIEW.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Read PR Diff
        id: pr_diff
        run: |
          {
            echo 'content<<EOF'
            cat pr.diff
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: AI Reviewer
        id: reviewer
        uses: actions/ai-inference@v1
        with:
          model: 'openai/gpt-4o-mini'
          system-prompt: |
            You are the Reviewer Agent. 
            Use the following codebase context and review instructions to analyze the PR diff.
            
            CODEBASE CONTEXT:
            ${{ steps.codebase.outputs.content }}
            
            REVIEW INSTRUCTIONS:
            ${{ steps.review_instructions.outputs.content }}
          prompt: |
            Analyze the following PR diff:
            ${{ steps.pr_diff.outputs.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### AI Code Review Result
            ${{ steps.reviewer.outputs.response }}
          comment_tag: ai-review-result

      - name: Add PR Label
        uses: actions/github-script@v7
        env:
          REVIEW_RESPONSE: ${{ steps.reviewer.outputs.response }}
        with:
          script: |
            const response = process.env.REVIEW_RESPONSE;
            let label = 'ai-review-pending';
            if (response.includes('ai-review-major')) label = 'ai-review-major';
            else if (response.includes('ai-review-minor')) label = 'ai-review-minor';
            
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [label]
            });
